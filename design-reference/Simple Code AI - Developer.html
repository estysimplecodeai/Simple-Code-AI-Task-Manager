<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simple Code AI — Developer</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="scai-brand.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--bg-1); overflow: hidden; }
  #root { height: 100%; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--bd-2); border-radius: 6px; border: 2px solid var(--bg-1); }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes scaiFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaiRise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="scai-store.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="scai-ui.jsx"></script>
<script type="text/babel" src="dev-views.jsx"></script>
<script type="text/babel" src="dev-modals.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "showStale": true,
  "headingFont": "neutral"
}/*EDITMODE-END*/;

function DevSwitcher() {
  const state = useStore();
  const [open, setOpen] = useState(false);
  const me = SCAI.personById(state.session.devId);
  return (
    <div style={{ position: "relative" }}>
      {open && <div onClick={() => setOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 5 }} />}
      <div style={{ borderTop: "1px solid var(--bd-1)", paddingTop: 10, marginTop: 6 }}>
        <a href="Simple Code AI - Manager.html" style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "var(--font-body)", fontSize: 12, color: "var(--fg-2)", border: "1px solid var(--bd-2)", borderRadius: "var(--r-1)", padding: "7px 10px", marginBottom: 8, background: "var(--paper)", textDecoration: "none" }}>
          <Icon name="shield" size={14} style={{ color: "var(--scai-teal)" }} />
          <span style={{ flex: 1 }}>Managing engineer view</span>
          <Icon name="arrow-up-right" size={13} style={{ color: "var(--fg-3)" }} />
        </a>
        <button onClick={() => setOpen(o => !o)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, background: open ? "var(--paper)" : "transparent", border: "1px solid " + (open ? "var(--bd-2)" : "transparent"), borderRadius: "var(--r-1)", padding: "6px 8px", cursor: "pointer" }}>
          <Avatar id={me.id} size={28} />
          <div style={{ minWidth: 0, textAlign: "left", flex: 1 }}>
            <div style={{ fontFamily: "var(--font-body)", fontSize: 12.5, fontWeight: 600, color: "var(--fg-1)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{me.name}</div>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--fg-3)" }}>{me.title}</div>
          </div>
          <Icon name="chevrons-up-down" size={13} style={{ color: "var(--fg-3)" }} />
        </button>
      </div>
      {open && (
        <div style={{ position: "absolute", bottom: "100%", left: 0, right: 0, marginBottom: 6, background: "var(--paper)", border: "1px solid var(--bd-2)", borderRadius: "var(--r-2)", boxShadow: "var(--shadow-2)", padding: 6, zIndex: 6 }}>
          <div className="eyebrow" style={{ padding: "4px 8px 6px", fontSize: 9 }}>View as developer</div>
          {SCAI.getState().developers.map(d => (
            <button key={d.id} onClick={() => { SCAI.setSessionDev(d.id); setOpen(false); }}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 9, background: d.id === me.id ? "rgba(46,175,183,0.10)" : "transparent", border: "none", borderRadius: "var(--r-1)", padding: "7px 8px", cursor: "pointer", textAlign: "left" }}
              onMouseEnter={e => { if (d.id !== me.id) e.currentTarget.style.background = "rgba(255,255,255,0.04)"; }}
              onMouseLeave={e => { if (d.id !== me.id) e.currentTarget.style.background = "transparent"; }}>
              <Avatar id={d.id} size={22} />
              <span style={{ fontFamily: "var(--font-body)", fontSize: 12.5, color: "var(--fg-1)", flex: 1 }}>{d.name}</span>
              {d.id === me.id && <Icon name="check" size={13} style={{ color: "var(--scai-teal)" }} />}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function DevSidebar({ me, view, spaceId, subView, onNav, onToggleSpace, expandedSpaces, pending, footer }) {
  const state = useStore();
  const mySpaces = SCAI.projectsForDev(me);

  function NavBtn({ id, icon, label, badge, active }) {
    return (
      <button onClick={() => onNav(id)} style={{
        display: "flex", alignItems: "center", gap: 9,
        padding: active ? "8px 10px 8px 8px" : "8px 10px",
        background: active ? "rgba(46,175,183,0.08)" : "transparent",
        borderTop: "none", borderRight: "none", borderBottom: "none",
        borderLeft: `2px solid ${active ? "var(--scai-teal)" : "transparent"}`,
        borderRadius: active ? "0 var(--r-1) var(--r-1) 0" : "var(--r-1)",
        color: active ? "var(--fg-1)" : "var(--fg-2)",
        fontFamily: "var(--font-body)", fontSize: 13, fontWeight: active ? 500 : 400,
        cursor: "pointer", textAlign: "left", width: "100%",
        transition: "background 120ms var(--ease)",
      }}
      onMouseEnter={e => { if (!active) { e.currentTarget.style.background = "rgba(255,255,255,0.04)"; e.currentTarget.style.color = "var(--fg-1)"; } }}
      onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--fg-2)"; } }}>
        <Icon name={icon} size={15} style={{ color: active ? "var(--scai-teal)" : "var(--fg-3)" }} />
        <span style={{ flex: 1 }}>{label}</span>
        {badge > 0 && <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 700, minWidth: 18, height: 18, padding: "0 5px", borderRadius: 9, background: "var(--scai-teal)", color: "#050709", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "var(--scai-teal-glow-sm)" }}>{badge}</span>}
      </button>
    );
  }

  return (
    <aside style={{ width: 230, flexShrink: 0, background: "var(--paper-2)", borderRight: "1px solid var(--bd-1)", display: "flex", flexDirection: "column", padding: "16px 12px", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: -30, left: -20, width: 200, height: 200, borderRadius: "50%", background: "radial-gradient(circle, rgba(46,175,183,0.05) 0%, transparent 70%)", pointerEvents: "none" }} />
      <div style={{ padding: "6px 8px 16px", position: "relative" }}>
        <img src="assets/scai-logo.png" alt="Simple Code AI" height="32" style={{ display: "block", mixBlendMode: "multiply", maxWidth: "100%", marginBottom: 6 }} />
        <div style={{ fontFamily: "var(--font-mono)", fontSize: 8.5, letterSpacing: "0.22em", color: "var(--scai-teal)", textTransform: "uppercase", opacity: 0.8 }}>DEVELOPER</div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 2, position: "relative" }}>
        <NavBtn id="dashboard" icon="layout-dashboard" label="Dashboard" active={view === "dashboard"} badge={0} />
        <NavBtn id="requests" icon="calendar-clock" label="Extension requests" active={view === "requests"} badge={pending} />
      </div>

      <div style={{ margin: "14px 0 6px", fontFamily: "var(--font-mono)", fontSize: 9, letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--fg-3)", padding: "0 10px" }}>Spaces</div>

      <div style={{ display: "flex", flexDirection: "column", gap: 1, overflowY: "auto", flex: 1 }}>
        {mySpaces.map(p => {
          const isOpen = expandedSpaces.has(p.id);
          const isActiveSpace = view === "space" && spaceId === p.id;
          const staleCount = state.tasks.filter(t => t.project === p.id && SCAI.isStale(t)).length;
          return (
            <div key={p.id}>
              {/* space header */}
              <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
                <button onClick={() => { onNav("space", p.id, subView || "board"); if (!isOpen) onToggleSpace(p.id); }}
                  style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, padding: "7px 8px 7px 10px",
                    background: isActiveSpace ? "rgba(46,175,183,0.06)" : "transparent",
                    borderTop: "none", borderRight: "none", borderBottom: "none",
                    borderLeft: `2px solid ${isActiveSpace ? "var(--scai-teal)" : "transparent"}`,
                    borderRadius: "0 var(--r-1) var(--r-1) 0", cursor: "pointer", textAlign: "left",
                    transition: "background 120ms",
                  }}
                  onMouseEnter={e => { if (!isActiveSpace) e.currentTarget.style.background = "rgba(255,255,255,0.03)"; }}
                  onMouseLeave={e => { if (!isActiveSpace) e.currentTarget.style.background = "transparent"; }}>
                  <span style={{ width: 7, height: 7, borderRadius: "50%", flexShrink: 0, background: isActiveSpace ? "var(--scai-teal)" : "var(--fg-3)", transition: "background 120ms" }} />
                  <span style={{ fontFamily: "var(--font-body)", fontSize: 12.5, fontWeight: isActiveSpace ? 600 : 400, color: isActiveSpace ? "var(--fg-1)" : "var(--fg-2)", flex: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</span>
                  {staleCount > 0 && <span style={{ fontFamily: "var(--font-mono)", fontSize: 9.5, color: "var(--danger)", background: "rgba(248,81,73,0.12)", border: "1px solid rgba(248,81,73,0.25)", borderRadius: 2, padding: "1px 5px" }}>{staleCount}</span>}
                </button>
                <button onClick={() => onToggleSpace(p.id)} style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 24, height: 28, background: "transparent", border: "none", cursor: "pointer", color: "var(--fg-3)", flexShrink: 0 }}
                  onMouseEnter={e => (e.currentTarget.style.color = "var(--fg-1)")}
                  onMouseLeave={e => (e.currentTarget.style.color = "var(--fg-3)")}>
                  <Icon name={isOpen ? "chevron-down" : "chevron-right"} size={12} />
                </button>
              </div>

              {/* sub-items */}
              {isOpen && (
                <div style={{ paddingLeft: 20, display: "flex", flexDirection: "column", gap: 1, marginBottom: 4 }}>
                  {[["board", "kanban-square", "Board"], ["list", "list", "List"]].map(([sv, icon, label]) => {
                    const active = isActiveSpace && subView === sv;
                    return (
                      <button key={sv} onClick={() => onNav("space", p.id, sv)}
                        style={{ display: "flex", alignItems: "center", gap: 8, padding: active ? "6px 10px 6px 8px" : "6px 10px",
                          background: active ? "rgba(46,175,183,0.10)" : "transparent",
                          borderTop: "none", borderRight: "none", borderBottom: "none",
                          borderLeft: `2px solid ${active ? "var(--scai-teal)" : "transparent"}`,
                          borderRadius: "0 var(--r-1) var(--r-1) 0",
                          color: active ? "var(--scai-teal)" : "var(--fg-3)",
                          fontFamily: "var(--font-body)", fontSize: 12, fontWeight: active ? 600 : 400,
                          cursor: "pointer", textAlign: "left", width: "100%",
                        }}
                        onMouseEnter={e => { if (!active) { e.currentTarget.style.background = "rgba(255,255,255,0.03)"; e.currentTarget.style.color = "var(--fg-2)"; } }}
                        onMouseLeave={e => { if (!active) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--fg-3)"; } }}>
                        <Icon name={icon} size={13} style={{ color: "currentColor" }} />
                        {label}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {footer}
    </aside>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const state = useStore();
  const [view, setView] = useState("dashboard");    // 'dashboard' | 'requests' | 'space'
  const [spaceId, setSpaceId] = useState(null);
  const [subView, setSubView] = useState("board");  // 'board' | 'list'
  const [openId, setOpenId] = useState(null);
  const [extTask, setExtTask] = useState(null);
  const me = state.session.devId;
  const mySpaces = SCAI.projectsForDev(me);
  const [expandedSpaces, setExpandedSpaces] = useState(() => new Set(mySpaces.map(p => p.id)));
  useIcons();

  useEffect(() => {
    document.documentElement.style.setProperty("--font-display",
      t.headingFont === "neutral" ? '"Mona Sans", system-ui, sans-serif' : '"Newsreader", Georgia, serif');
  }, [t.headingFont]);

  // Re-expand any new spaces when dev changes
  useEffect(() => {
    setExpandedSpaces(new Set(SCAI.projectsForDev(me).map(p => p.id)));
  }, [me]);

  const pending = state.tasks.filter(x => x.ext && x.ext.state === "pending" && x.assignee === me).length;
  const myStale = SCAI.tasksAssignedTo(me).filter(x => SCAI.isStale(x)).length;

  function onNav(v, pid, sv) {
    if (v === "space") { setView("space"); setSpaceId(pid); setSubView(sv || "board"); }
    else { setView(v); setSpaceId(null); }
  }
  function onToggleSpace(pid) {
    setExpandedSpaces(prev => { const s = new Set(prev); s.has(pid) ? s.delete(pid) : s.add(pid); return s; });
  }

  const activeSpace = spaceId ? SCAI.projectById(spaceId) : null;
  const crumbBase = ["Simple Code AI", "Developer"];
  const titles = {
    dashboard: { title: "Dashboard", lead: SCAI.personById(me).name, crumbs: [...crumbBase, "Dashboard"] },
    requests:  { title: "Extension requests", lead: "Your requests", crumbs: [...crumbBase, "Requests"] },
    space: {
      title: activeSpace?.name || "",
      lead: subView === "board" ? "Board" : "List",
      crumbs: [...crumbBase, "Spaces", activeSpace?.name || "", subView === "board" ? "Board" : "List"],
    },
  };
  const ti = titles[view] || titles.dashboard;

  let screen;
  if (view === "dashboard") screen = <DevDashboard me={me} onOpen={setOpenId} onRequestExt={setExtTask} goTo={(v) => onNav(v)} />;
  else if (view === "requests") screen = <DevRequests onOpen={setOpenId} />;
  else if (view === "space" && spaceId && subView === "board") screen = <SpaceBoard projectId={spaceId} onOpen={setOpenId} onRequestExt={setExtTask} />;
  else if (view === "space" && spaceId) screen = <DevTaskList density={t.density} onOpen={setOpenId} defaultProject={spaceId} defaultScope="team" />;
  else screen = <DevDashboard me={me} onOpen={setOpenId} onRequestExt={setExtTask} goTo={(v) => onNav(v)} />;

  return (
    <div data-screen-label={"Developer / " + view} style={{ display: "flex", height: "100vh", background: "var(--bg-1)" }}>
      <DevSidebar me={me} view={view} spaceId={spaceId} subView={subView}
        onNav={onNav} onToggleSpace={onToggleSpace} expandedSpaces={expandedSpaces}
        pending={pending} footer={<DevSwitcher />} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
        <TopBar crumbs={ti.crumbs} title={ti.title} lead={ti.lead}
          right={
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {myStale > 0 && (
                <div style={{ display: "flex", alignItems: "center", gap: 7, background: "rgba(248,81,73,0.08)", border: "1px solid rgba(248,81,73,0.28)", borderRadius: "var(--r-1)", padding: "6px 11px", color: "var(--danger)", fontFamily: "var(--font-mono)", fontSize: 11.5, fontWeight: 600 }}>
                  <Icon name="alert-triangle" size={14} /> {myStale} stale
                </div>
              )}
              <Avatar id={me} size={32} ring />
            </div>
          } />
        {screen}
      </div>

      {openId && <DevTaskDetail taskId={openId} onClose={() => setOpenId(null)} onRequestExt={task => { setOpenId(null); setExtTask(task); }} />}
      {extTask && <ExtensionModal task={SCAI.taskById(extTask.id)} onClose={() => setExtTask(null)} />}

      <ToastHost />
      <TweaksPanel>
        <TweakSection label="Board" />
        <TweakToggle label="Show Stale column" value={t.showStale} onChange={v => setTweak("showStale", v)} />
        <TweakSection label="Density" />
        <TweakRadio label="List rows" value={t.density} options={["comfortable", "compact"]} onChange={v => setTweak("density", v)} />
        <TweakSection label="Demo" />
        <TweakButton label="Reset demo data" onClick={() => { SCAI.resetDemo(); toast("Demo data reset"); }} />
      </TweaksPanel>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
